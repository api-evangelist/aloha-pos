naftiko: "1.0.0-alpha2"

info:
  label: "NCR Voyix Commerce Platform APIs (Aloha) — Site"
  description: >-
    Site provisioning — Site. 4 operations. Lead operation: Create Site.
    Provision and look up Aloha sites (locations) on the NCR Voyix Platform,
    using ACTIVE/INACTIVE status as a soft-delete. Self-contained Naftiko
    capability covering one NCR Voyix business surface.
  tags:
    - NCR Voyix
    - Aloha
    - Site
  created: "2026-06-02"
  modified: "2026-06-02"

binds:
  - namespace: env
    keys:
      NCR_VOYIX_ACCESS_KEY: NCR_VOYIX_ACCESS_KEY

capability:

  consumes:
    - type: http
      namespace: "ncr-voyix-platform-site"
      baseUri: "https://api.ncr.com"
      description: "NCR Voyix Commerce Platform APIs (Aloha) — Site business capability. Self-contained, no shared references."
      authentication:
        type: apikey
        key: Authorization
        value: "{{env.NCR_VOYIX_ACCESS_KEY}}"
        placement: header
      resources:
        - name: "site-sites"
          path: "/site/sites"
          operations:
            - name: "createSite"
              method: POST
              description: "Create Site"
              inputParameters:
                - name: "body"
                  in: body
                  type: object
                  required: true
                  description: "The site payload."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "site-sites-find-by-criteria"
          path: "/site/sites/find-by-criteria"
          operations:
            - name: "findSitesByCriteria"
              method: POST
              description: "Find Sites By Criteria"
              inputParameters:
                - name: "pageSize"
                  in: query
                  type: integer
                  required: false
                  description: "Page size."
                - name: "body"
                  in: body
                  type: object
                  required: true
                  description: "The site search criteria."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "site-sites-site-id"
          path: "/site/sites/{siteId}"
          operations:
            - name: "getSite"
              method: GET
              description: "Get Site"
              inputParameters:
                - name: "siteId"
                  in: path
                  type: string
                  required: true
                  description: "The alphanumeric site identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: "updateSite"
              method: PUT
              description: "Update Site"
              inputParameters:
                - name: "siteId"
                  in: path
                  type: string
                  required: true
                  description: "The alphanumeric site identifier."
                - name: "body"
                  in: body
                  type: object
                  required: true
                  description: "The site payload."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      namespace: "ncr-voyix-platform-site-rest"
      port: 8080
      description: "REST adapter for NCR Voyix Commerce Platform APIs (Aloha) — Site. One Spectral-compliant resource per consumed operation, prefixed with /v1."
      resources:
        - path: "/v1/site/sites"
          name: "site-sites"
          description: "REST surface for sites."
          operations:
            - method: POST
              name: "createSite"
              description: "Create Site"
              call: "ncr-voyix-platform-site.createSite"
              with:
                "body": "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/site/sites/find-by-criteria"
          name: "site-sites-find-by-criteria"
          description: "REST surface for site search."
          operations:
            - method: POST
              name: "findSitesByCriteria"
              description: "Find Sites By Criteria"
              call: "ncr-voyix-platform-site.findSitesByCriteria"
              with:
                "pageSize": "rest.pageSize"
                "body": "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/site/sites/{site-id}"
          name: "site-sites-site-id"
          description: "REST surface for a single site."
          operations:
            - method: GET
              name: "getSite"
              description: "Get Site"
              call: "ncr-voyix-platform-site.getSite"
              with:
                "siteId": "rest.siteId"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: PUT
              name: "updateSite"
              description: "Update Site"
              call: "ncr-voyix-platform-site.updateSite"
              with:
                "siteId": "rest.siteId"
                "body": "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."
    - type: mcp
      namespace: "ncr-voyix-platform-site-mcp"
      port: 9090
      transport: http
      description: "MCP adapter for NCR Voyix Commerce Platform APIs (Aloha) — Site. One tool per consumed operation, routed inline through this capability's consumes block."
      tools:
        - name: "create-site"
          description: "Create Site"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "ncr-voyix-platform-site.createSite"
          with:
            "body": "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "find-sites-by-criteria"
          description: "Find Sites By Criteria"
          hints:
            readOnly: true
            destructive: false
            idempotent: false
          call: "ncr-voyix-platform-site.findSitesByCriteria"
          with:
            "pageSize": "tools.pageSize"
            "body": "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "get-site"
          description: "Get Site"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "ncr-voyix-platform-site.getSite"
          with:
            "siteId": "tools.siteId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "update-site"
          description: "Update Site"
          hints:
            readOnly: false
            destructive: false
            idempotent: true
          call: "ncr-voyix-platform-site.updateSite"
          with:
            "siteId": "tools.siteId"
            "body": "tools.body"
          outputParameters:
            - type: object
              mapping: "$."

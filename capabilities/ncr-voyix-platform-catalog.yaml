naftiko: "1.0.0-alpha2"

info:
  label: "NCR Voyix Commerce Platform APIs (Aloha) — Catalog"
  description: >-
    Catalog management — Catalog. 6 operations. Lead operation: Create Or Update
    Catalog Item. Manage Aloha catalog items and their prices on the NCR Voyix
    Business Services Platform. Self-contained Naftiko capability covering one
    NCR Voyix business surface.
  tags:
    - NCR Voyix
    - Aloha
    - Catalog
  created: "2026-06-02"
  modified: "2026-06-02"

binds:
  - namespace: env
    keys:
      NCR_VOYIX_ACCESS_KEY: NCR_VOYIX_ACCESS_KEY

capability:

  consumes:
    - type: http
      namespace: "ncr-voyix-platform-catalog"
      baseUri: "https://api.ncr.com"
      description: "NCR Voyix Commerce Platform APIs (Aloha) — Catalog business capability. Self-contained, no shared references."
      authentication:
        type: apikey
        key: Authorization
        value: "{{env.NCR_VOYIX_ACCESS_KEY}}"
        placement: header
      resources:
        - name: "catalog-items-item-code"
          path: "/catalog/items/{itemCode}"
          operations:
            - name: "getCatalogItem"
              method: GET
              description: "Get Catalog Item"
              inputParameters:
                - name: "itemCode"
                  in: path
                  type: string
                  required: true
                  description: "The catalog item code."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: "putCatalogItem"
              method: PUT
              description: "Create Or Update Catalog Item"
              inputParameters:
                - name: "itemCode"
                  in: path
                  type: string
                  required: true
                  description: "The catalog item code."
                - name: "body"
                  in: body
                  type: object
                  required: true
                  description: "The catalog item payload."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "catalog-items"
          path: "/catalog/items"
          operations:
            - name: "listCatalogItems"
              method: GET
              description: "List Catalog Items"
              inputParameters:
                - name: "merchandiseCategoryId"
                  in: query
                  type: string
                  required: false
                  description: "Filter by merchandise category."
                - name: "itemStatus"
                  in: query
                  type: string
                  required: false
                  description: "Filter by item status."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "catalog-item-prices-item-code-price-id"
          path: "/catalog/item-prices/{itemCode}/{priceId}"
          operations:
            - name: "getItemPrice"
              method: GET
              description: "Get Item Price"
              inputParameters:
                - name: "itemCode"
                  in: path
                  type: string
                  required: true
                  description: "The catalog item code."
                - name: "priceId"
                  in: path
                  type: string
                  required: true
                  description: "The price identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: "putItemPrice"
              method: PUT
              description: "Create Or Update Item Price"
              inputParameters:
                - name: "itemCode"
                  in: path
                  type: string
                  required: true
                  description: "The catalog item code."
                - name: "priceId"
                  in: path
                  type: string
                  required: true
                  description: "The price identifier."
                - name: "body"
                  in: body
                  type: object
                  required: true
                  description: "The item price payload."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "catalog-item-prices-get-multiple"
          path: "/catalog/item-prices/get-multiple"
          operations:
            - name: "getMultipleItemPrices"
              method: POST
              description: "Get Multiple Item Prices"
              inputParameters:
                - name: "body"
                  in: body
                  type: object
                  required: true
                  description: "The list of item codes to price."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      namespace: "ncr-voyix-platform-catalog-rest"
      port: 8080
      description: "REST adapter for NCR Voyix Commerce Platform APIs (Aloha) — Catalog. One Spectral-compliant resource per consumed operation, prefixed with /v1."
      resources:
        - path: "/v1/catalog/items/{item-code}"
          name: "catalog-items-item-code"
          description: "REST surface for catalog item."
          operations:
            - method: GET
              name: "getCatalogItem"
              description: "Get Catalog Item"
              call: "ncr-voyix-platform-catalog.getCatalogItem"
              with:
                "itemCode": "rest.itemCode"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: PUT
              name: "putCatalogItem"
              description: "Create Or Update Catalog Item"
              call: "ncr-voyix-platform-catalog.putCatalogItem"
              with:
                "itemCode": "rest.itemCode"
                "body": "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/catalog/items"
          name: "catalog-items"
          description: "REST surface for catalog items."
          operations:
            - method: GET
              name: "listCatalogItems"
              description: "List Catalog Items"
              call: "ncr-voyix-platform-catalog.listCatalogItems"
              with:
                "merchandiseCategoryId": "rest.merchandiseCategoryId"
                "itemStatus": "rest.itemStatus"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/catalog/item-prices/{item-code}/{price-id}"
          name: "catalog-item-prices-item-code-price-id"
          description: "REST surface for catalog item price."
          operations:
            - method: GET
              name: "getItemPrice"
              description: "Get Item Price"
              call: "ncr-voyix-platform-catalog.getItemPrice"
              with:
                "itemCode": "rest.itemCode"
                "priceId": "rest.priceId"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: PUT
              name: "putItemPrice"
              description: "Create Or Update Item Price"
              call: "ncr-voyix-platform-catalog.putItemPrice"
              with:
                "itemCode": "rest.itemCode"
                "priceId": "rest.priceId"
                "body": "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/catalog/item-prices/get-multiple"
          name: "catalog-item-prices-get-multiple"
          description: "REST surface for bulk item prices."
          operations:
            - method: POST
              name: "getMultipleItemPrices"
              description: "Get Multiple Item Prices"
              call: "ncr-voyix-platform-catalog.getMultipleItemPrices"
              with:
                "body": "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."
    - type: mcp
      namespace: "ncr-voyix-platform-catalog-mcp"
      port: 9090
      transport: http
      description: "MCP adapter for NCR Voyix Commerce Platform APIs (Aloha) — Catalog. One tool per consumed operation, routed inline through this capability's consumes block."
      tools:
        - name: "get-catalog-item"
          description: "Get Catalog Item"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "ncr-voyix-platform-catalog.getCatalogItem"
          with:
            "itemCode": "tools.itemCode"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "create-update-catalog-item"
          description: "Create Or Update Catalog Item"
          hints:
            readOnly: false
            destructive: false
            idempotent: true
          call: "ncr-voyix-platform-catalog.putCatalogItem"
          with:
            "itemCode": "tools.itemCode"
            "body": "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "list-catalog-items"
          description: "List Catalog Items"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "ncr-voyix-platform-catalog.listCatalogItems"
          with:
            "merchandiseCategoryId": "tools.merchandiseCategoryId"
            "itemStatus": "tools.itemStatus"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "get-item-price"
          description: "Get Item Price"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "ncr-voyix-platform-catalog.getItemPrice"
          with:
            "itemCode": "tools.itemCode"
            "priceId": "tools.priceId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "create-update-item-price"
          description: "Create Or Update Item Price"
          hints:
            readOnly: false
            destructive: false
            idempotent: true
          call: "ncr-voyix-platform-catalog.putItemPrice"
          with:
            "itemCode": "tools.itemCode"
            "priceId": "tools.priceId"
            "body": "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "get-multiple-item-prices"
          description: "Get Multiple Item Prices"
          hints:
            readOnly: true
            destructive: false
            idempotent: false
          call: "ncr-voyix-platform-catalog.getMultipleItemPrices"
          with:
            "body": "tools.body"
          outputParameters:
            - type: object
              mapping: "$."

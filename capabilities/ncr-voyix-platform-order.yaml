naftiko: "1.0.0-alpha2"

info:
  label: "NCR Voyix Commerce Platform APIs (Aloha) — Order"
  description: >-
    Order management — Order. 3 operations. Lead operation: Create Order. Create
    and look up checks/orders routed into Aloha through the NCR Voyix Order
    Service. Self-contained Naftiko capability covering one NCR Voyix business
    surface.
  tags:
    - NCR Voyix
    - Aloha
    - Order
  created: "2026-06-02"
  modified: "2026-06-02"

binds:
  - namespace: env
    keys:
      NCR_VOYIX_ACCESS_KEY: NCR_VOYIX_ACCESS_KEY

capability:

  consumes:
    - type: http
      namespace: "ncr-voyix-platform-order"
      baseUri: "https://api.ncr.com"
      description: "NCR Voyix Commerce Platform APIs (Aloha) — Order business capability. Self-contained, no shared references."
      authentication:
        type: apikey
        key: Authorization
        value: "{{env.NCR_VOYIX_ACCESS_KEY}}"
        placement: header
      resources:
        - name: "order-orders"
          path: "/order/orders"
          operations:
            - name: "createOrder"
              method: POST
              description: "Create Order"
              inputParameters:
                - name: "nep-enterprise-unit"
                  in: header
                  type: string
                  required: true
                  description: "Identifier of the enterprise unit (location)."
                - name: "nep-service-version"
                  in: header
                  type: string
                  required: false
                  description: "The targeted service version (e.g. 3:1)."
                - name: "body"
                  in: body
                  type: object
                  required: true
                  description: "The order payload."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "order-3-orders-1-order-id"
          path: "/order/3/orders/1/{orderId}"
          operations:
            - name: "getOrder"
              method: GET
              description: "Get Order"
              inputParameters:
                - name: "orderId"
                  in: path
                  type: string
                  required: true
                  description: "The order identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "order-3-orders-1-find"
          path: "/order/3/orders/1/find"
          operations:
            - name: "findOrders"
              method: POST
              description: "Find Orders"
              inputParameters:
                - name: "pageNumber"
                  in: query
                  type: integer
                  required: false
                  description: "Zero-based page number."
                - name: "pageSize"
                  in: query
                  type: integer
                  required: false
                  description: "Page size."
                - name: "body"
                  in: body
                  type: object
                  required: true
                  description: "The order search criteria."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      namespace: "ncr-voyix-platform-order-rest"
      port: 8080
      description: "REST adapter for NCR Voyix Commerce Platform APIs (Aloha) — Order. One Spectral-compliant resource per consumed operation, prefixed with /v1."
      resources:
        - path: "/v1/order/orders"
          name: "order-orders"
          description: "REST surface for orders."
          operations:
            - method: POST
              name: "createOrder"
              description: "Create Order"
              call: "ncr-voyix-platform-order.createOrder"
              with:
                "nep-enterprise-unit": "rest.nep-enterprise-unit"
                "nep-service-version": "rest.nep-service-version"
                "body": "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/order/3/orders/1/{order-id}"
          name: "order-3-orders-1-order-id"
          description: "REST surface for a single order."
          operations:
            - method: GET
              name: "getOrder"
              description: "Get Order"
              call: "ncr-voyix-platform-order.getOrder"
              with:
                "orderId": "rest.orderId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/order/3/orders/1/find"
          name: "order-3-orders-1-find"
          description: "REST surface for order search."
          operations:
            - method: POST
              name: "findOrders"
              description: "Find Orders"
              call: "ncr-voyix-platform-order.findOrders"
              with:
                "pageNumber": "rest.pageNumber"
                "pageSize": "rest.pageSize"
                "body": "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."
    - type: mcp
      namespace: "ncr-voyix-platform-order-mcp"
      port: 9090
      transport: http
      description: "MCP adapter for NCR Voyix Commerce Platform APIs (Aloha) — Order. One tool per consumed operation, routed inline through this capability's consumes block."
      tools:
        - name: "create-order"
          description: "Create Order"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "ncr-voyix-platform-order.createOrder"
          with:
            "nep-enterprise-unit": "tools.nep-enterprise-unit"
            "nep-service-version": "tools.nep-service-version"
            "body": "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "get-order"
          description: "Get Order"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "ncr-voyix-platform-order.getOrder"
          with:
            "orderId": "tools.orderId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "find-orders"
          description: "Find Orders"
          hints:
            readOnly: true
            destructive: false
            idempotent: false
          call: "ncr-voyix-platform-order.findOrders"
          with:
            "pageNumber": "tools.pageNumber"
            "pageSize": "tools.pageSize"
            "body": "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
